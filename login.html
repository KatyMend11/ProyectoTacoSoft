<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Sinaloense - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1>El Sinaloense</h1>
                <span>POS</span>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="loginUser">Usuario</label>
                    <input type="text" id="loginUser" class="form-control" placeholder="Ingresa tu usuario" required autofocus>
                </div>
                <div class="form-group">
                    <label for="loginPass">Contrasena</label>
                    <input type="password" id="loginPass" class="form-control" placeholder="Ingresa tu contrasena" required>
                </div>
                <button type="submit" class="btn btn-primary btn-login">Iniciar Sesion</button>
                <div id="loginError" class="login-error"></div>
            </form>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
